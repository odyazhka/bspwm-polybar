[colors]
background = #000000
foreground = #ffffff
primary = #fc00ef
alert = #f53c3c
charging = #26a65b

[bar/main]
monitor = ${env:MONITOR:}
override-redirect = false
width = 100%
height = 24pt
background = ${colors.background}
foreground = ${colors.foreground}
fixed-center = true
padding-left = 0
padding-right = 0
module-margin = 0
line-size = 10
padding-top = 0
padding-bottom = 0
font-0 = "terminus-font:bold:size=18;2"
font-1 = "Symbols Nerd Font:size=12;3"
modules-left = launcher sep xwindow
modules-center =  sep time sep date sep
#modules-right = tray sep power sep color sep blue sep network sep bg sep gromkost sep stol sep xkeyboard sep battery sep date sep time sep1
modules-right = tray sep stol sep xkeyboard sep battery sep network sep bg sep gromkost sep color sep blue sep power
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = bspwm

[module/sep]
type = custom/text
content = "%{B-}%{O5}%{B#12FC00}%{O3}%{B-}%{O5}"
content-padding = 0
margin = 0
content-margin = 5pt

[module/sep1]
type = custom/text
content = "%{O3}"
content-padding = 0
margin = 0
content-margin = 3pt

[module/launcher]
type = custom/text
format = " пЊ®"
click-left = rofi -show drun -show-icons

[module/power]
type = custom/text
format = "у°¤† "
click-left = ~/.config/rofi/rofi-power.sh

[module/xwindow]
type = internal/xwindow
label = "%title%"
label-maxlen = 80

[module/network]
type = custom/text
format = "п‡«"
click-left = ~/.config/polybar/scripts/odjk-wifi

[module/bg]
type = custom/text
format = "п”ў"
click-left = xterm -T "RpkocTb" -e sudo brightness

[module/gromkost]
type = custom/text
format = "пЂЁ"
click-left = pavucontrol

[module/color]
type = custom/text
format = "о­њ"
click-left = ~/.config/polybar/scripts/color

[module/blue]
type = custom/text
format = "у°‚Ї"
click-left = blueman-manager

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
format = <label-layout>
label-layout = %icon%
layout-icon-0 = us;ENG
layout-icon-1 = ru;Р РЈРЎ

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 100
low-at = 15
format-charging = п„‚ <ramp-capacity> <label-charging>
label-charging = "%percentage%%"
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = "%percentage%%"
format-full = <ramp-capacity> <label-full>
label-full = "%percentage%%"
format-low = <ramp-capacity> <label-low>
format-low-background = ${colors.alert}
label-low = "%percentage%%"
ramp-capacity-0 = у°Ѓє
ramp-capacity-1 = у°ЃЅ
ramp-capacity-2 = у°Ѓї
ramp-capacity-3 = у°‚‚
ramp-capacity-4 = у°Ѓ№

[module/date]
type = custom/script
exec = ~/.config/polybar/scripts/date.sh
interval = 0.1
click-left = ~/.config/polybar/scripts/date.sh toggle

[module/time]
type = internal/date
interval = 1
time = %H:%M
time-alt = %I:%M %p
label = %time%

[module/tray]
type = internal/tray
tray-spacing = 7px
tray-size = 18px

[module/stol]
type        = custom/script
exec        = bash ~/.config/polybar/scripts/stol.sh loop
interval    = 0
tail        = true
click-left  = bash ~/.config/polybar/scripts/stol.sh toggle &
